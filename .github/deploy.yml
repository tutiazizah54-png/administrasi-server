name: Deploy via Self-Hosted Runner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sinkronisasi File ke Folder Web Server
        run: |
          rsync -avz --exclude='.git' --exclude='.github' ./ /var/www/wp1/
          echo "Deployment Berhasil ke /var/www/automation_push menggunakan Runner lokal!"