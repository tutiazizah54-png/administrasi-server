<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ujian Web Programming</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


  <h2>2. Event Button (Ubah Warna)</h2>
  <div id="box"></div>
  <button onclick="ubahWarna()">Klik Ubah Warna</button>

  <hr>

  
  <h2>3. Tambah Elemen HTML</h2>
  <button onclick="tambahElemen()">Tambah Paragraf</button>

  <hr>

  <h2>4. Program Hitung</h2>

  <input type="number" id="angka1" placeholder="Angka 1">
  <input type="number" id="angka2" placeholder="Angka 2">

  <div class="btn-group">
    <button class="btn tambah" onclick="hitung('+')">+</button>
    <button class="btn kurang" onclick="hitung('-')">-</button>
    <button class="btn kali" onclick="hitung('*')">×</button>
    <button class="btn bagi" onclick="hitung('/')">÷</button>
  </div>

  <div class="btn-group">
    <button class="btn reset" onclick="hapusInput()">Hapus Input</button>
    <button class="btn clear" onclick="hapusHistory()">Hapus History</button>
  </div>

  <div id="history"></div>

  <script src="script.js"></script>
</body>
</html>
